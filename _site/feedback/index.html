<article class="about">
	<h2 class="brown-heading">Feedback</h2>
	<p> Choose a category:
	</p>
	<div style="width:550px; margin-top:-18px;">
		<select id="feedback_category" class="feedback-select">
			<optgroup label="Choose a feedback cagetory:">
			<option value="general">General feedback</option>
			<option value="first">First impressions</option>
			<option value="confusion">User-experience confusion</option>
			<option value="request">Feature request</option>
			<option value="question">Question</option>
			<option value="dataproblem">Data problem (usually reported from work pages)</option>
			<option value="webproblem">Website problem (something is not working, hopefully not this feedback form)</option>
			<option value="compliment">Compliment</option>
			<option value="other">Other</option>
			<optgroup>
		</select>
		<br>
	   <textarea id="feedback_description" style="margin-top:-15px; font-family:Leto,sans-serif;" 
		rows=10 cols=60 placeholder="description"></textarea>
		<br>
		<input id="feedback_submitter" size=58 style="font-family:Leto,sans-serif;" type=text placeholder="your name and/or contact information">
		<br>
   	<input onclick="storeParameters();" class="btn btn-brown" type=submit value=Submit>
		<br>
		<div id="status"></div>
	</div>
	</p>
<p style="margin-top:50px; margin-bottom:100px;">
	For more detailed feedback, email someone listed on the
	<a href=/contact>contact page</a> directly.
</p>
</article>

// storeParameters --

function storeParameters() {
   var category     = document.getElementById("feedback_category").value;
   var submitter    = document.getElementById("feedback_submitter").value;
   var description  = document.getElementById("feedback_description").value;
   var referer      = document.referrer;
	var action       = "feedbackformsubmit";

   var url = "/data?action="       + action;
	url += "&feedback_category="    + encodeURIComponent(category);
	url += "&feedback_submitter="   + encodeURIComponent(submitter);
	url += "&feedback_description=" + encodeURIComponent(description);
	url += "&feedback_referer="     + encodeURIComponent(referer);

   var returnvalue = ReadFile(url);

	var status = document.getElementById("status");
	var message = "<p>\n";
   if (returnvalue.match(/success/i)) {
		document.getElementById("feedback_description").value = "";
		message += "Thank you for your feedback. ";
		message += " <a href=" + referer+ ">Click here</a> or press the back button in the browser";
		message += " to return to the previous page.\n";
   } else {
		message += "Sorry, there was a problem submitting the feedback.  ";
		message += "Try emailing the feedback to someone on the ";
		message += "<a href=/contact>contact page</a>.";
		message += "</p>\n";
		message += "<p>\n";
		message += "Error message:\n";
		message += returnvalue;
	}
	message += "</p>\n";
	status.innerHTML = message;

   return true;
}



</script>
