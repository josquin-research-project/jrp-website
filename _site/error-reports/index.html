<script src="/scripts/external/handlebars-v2.0.0.js"></script>
<script src="/scripts/scripts-common.js"></script>
<script>
//
// Programmer:		Craig Stuart Sapp <craig@ccrma.stanford.edu>
// Creation Date:	Fri Oct 24 00:39:15 PDT 2014
// Last Modified:	Fri Oct 24 00:39:18 PDT 2014
// Filename:		...error-reports/scripts-local.html
// Web Address:	http://josquin.stanford.edu/error-reports/scripts-local.html
// Syntax:			JavaScript 1.8/ECMAScript 5
// vim:				ts=3: ft=javascript
//
// Description:   JavaScript management of the JRP error reports.
//

var ERRORLIST = [];
var FORCE = "false";

// get display style from localStorage:
if (!localStorage.ERRORdisplaystyle) {
   localStorage.ERRORdisplaystyle = '0';
}
if (localStorage.ERRORdisplaystyle == 'true') {
   localStorage.ERRORdisplaystyle = '1';
}
if (localStorage.ERRORdisplaystyle == 'false') {
   localStorage.ERRORdisplaystyle = '0';
}
if (!localStorage.ERRORdisplaystyle.match(/^\d$/)) {
   localStorage.ERRORdisplaystyle = "0";
}
var DISPLAY_STYLE = parseInt(localStorage.ERRORdisplaystyle);


//////////////////////////////
//
// DOMContentLoaded event listener --
//

document.addEventListener('DOMContentLoaded', function() {
	var CgiParameters = GetCgiParameters();
	if (typeof CgiParameters['force'] !== "undefined") {
		FORCE = "true";
	}
   getErrorReports();


   ///////////////////////////
   //
   // #display-button event handler --
   //

	var displaybutton = document.getElementById("display-button");
	if (displaybutton) {
		displaybutton.addEventListener("click", function() {
			DISPLAY_STYLE = !DISPLAY_STYLE;
			localStorage.ERRORdisplaystyle = DISPLAY_STYLE;
			displayErrorList();
		}, false);
	}


}, false);




//////////////////////////////
//
// getErrorReports --
//

function getErrorReports() {
	var request = new XMLHttpRequest();
	request.open('GET', '/data?a=errors-json&force=' + FORCE, true);
	request.addEventListener('load', function() {
		if (request.status = 200) {
			ERRORLIST = JSON.parse(request.responseText);
   		ERRORLIST.sort(byReverseDate);
			displayErrorList();
			return;
		}
	});
	request.send();
}



//////////////////////////////
//
// byReverseDate -- sort a work by reverse date.
//


function byReverseDate(a, b) {
   var date1 = a.date;
   var date2 = b.date;

	if (!date1) { date1 = 0; }
	if (!date2) { date2 = 0; }
   if (date1 > date2) { return -1; } 
   if (date1 < date2) { return +1; }

   return 0;
}



//////////////////////////////
//
// displayErrorList --
//

function displayErrorList() {
   var container = document.getElementById("error-content");
	var source = document.getElementById("error-table");
	var template = Handlebars.compile(source.textContent);
	var i;
	var button;

	if (DISPLAY_STYLE) {
		// show unprocess reports first
		var errorlist1 = [];
		var errorlist2 = [];
		for (i=0; i<ERRORLIST.length; i++) {
			if (!ERRORLIST[i].action) {
				errorlist1.push(ERRORLIST[i]);
			} else if (ERRORLIST[i].action.match(/^\s*$/)) {
				errorlist1.push(ERRORLIST[i]);
			} else if (ERRORLIST[i].action.match(/Not yet processed/)) {
				errorlist1.push(ERRORLIST[i]);
			} else {
				errorlist2.push(ERRORLIST[i]);
			}
		}
		var table1 = template(errorlist1);
		var table2 = template(errorlist2);
		container.innerHTML = table1 + table2;
		var tables = document.querySelectorAll("table.error");
		for (i=0; i<tables.length; i++) {
			tables[i].style.marginRight = 0;
		}
		button = document.getElementById("display-button");
		if (button) {
			button.textContent = "Show unprocessed entries merged";
		}
	} else {
		container.innerHTML = template(ERRORLIST);
		var table = document.querySelector("table.error");
		if (table) {
			table.style.marginRight = 0;
		}
		button = document.getElementById("display-button");
		if (button) {
			button.textContent = "Show unprocessed entries first";
		} else {
		}
	}
}



</script>

<script id="error-table" type="text/x-handlebars-template">

<table class="error">

{{#each this}}
<tr>
<td>

<dl class="error">
<dt>  Work		</dt>
<dd>  {{jrpid}}  <a target="_blank" href="/work?id={{jrpid}}">{{{work}}}</a>	</dd>

<dt>  Date		</dt>
<dd>  {{{showdate this}}}	</dd>

{{#if voices}}
	{{{showvoices this}}}
{{/if}}

{{#if measure}}
	{{{showmeasures this}}}
{{/if}}

<dt>  Description	</dt>
<dd>  
{{#unless action}}<span style="color:#c00;">{{/unless}}
	{{{description}}} 
{{#unless action}}</span>{{/unless}}
</dd>

{{#if action}}
<dt>  Action		</dt>
<dd>  {{{action}}}	</dd>
{{/if}}

</dl>

</td>
</tr>
{{/each}}

</table>

</script>


<script>
// Handlerbars helper functions for use with the #error-table table


//////////////////////////////
//
// Handlebars showvoices helper function --
//

Handlebars.registerHelper('showvoices', function(entry) {
	var action = entry.action;
   if (!action) {
		return "";
	}
	var voices = entry.voice;
	var heading = "";
	if (voices.match(/^\s*\d+\s*$/)) {
		heading = "Voice";
	} else if (voices.match(/\d+\s*-\s*\d*/)) {
		heading = "Voices";
		voices.replace(/\s*-+\s*/, "&ndash;");
	} else {
		heading = "Voice(s)";
	}
	var output = "<dt>" + heading + "</dt>";
	output += "<dd>" + voices + "</dd>";
	return output;
});



//////////////////////////////
//
// Handlebars showmeasures helper function --
//

Handlebars.registerHelper('showmeasures', function(entry) {
	var action = entry.action;
   if (!action) {
		return "";
	}
	var measures = entry.measure;
	var heading = "";
	if (measures.match(/^\s*\d+\s*$/)) {
		heading = "Measure";
	} else if (measures.match(/\d+\s*-\s*\d*/)) {
		heading = "Measures";
		measures.replace(/\s*-+\s*/, "&ndash;");
	} else {
		heading = "Measure(s)";
	}
	var output = "<dt>" + heading + "</dt>";
	output += "<dd>" + measures + "</dd>";
	return output;
});



//////////////////////////////
//
// Handlebars showdate helper function --
//

Handlebars.registerHelper('showdate', function(entry) {
   var datestring = entry.date;
   var matches = datestring.match(/^(\d{4})(\d\d)(\d\d)(\d\d)(\d\d)(\d\d)/);
	if (!matches) {
		return "";
	}

	var m = ['','Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 
					'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

	var year	 	= matches[1];
	var month	= m[parseInt(matches[2])];
	var day	 	= parseInt(matches[3]);
	var hour	 	= parseInt(matches[4]);
	var min	 	= matches[5];
	var sec	  	= matches[6];
	var text = day + " " + month + " " + year;
	text += ' <span style="color:#ccc">';
	text += hour + ':' + min + ':' + sec + '</span>';
	return text;
});


</script>
