let WORKS = {% include metadata/works.json %};
let COMPOSERS = {% include metadata/composers.json %};
</script>
<script src="/analysis/scripts-common.js"></script>
<script>
function displayContents(repertory) {
  if (typeof repertory === "undefined" || repertory === null) {
    repertory = localStorage.ANALYSISrepertory || "";
  }
  buildRepertorySelect();
  $("#repertory").val(repertory);
  StylizeFormElements();
  showRepertory(repertory);
}

function showRepertory(repertory) {
  if (typeof repertory === "undefined" || repertory === null) {
    repertory = document.getElementById("repertory") ? document.getElementById("repertory").value : "";
  }

  localStorage.ANALYSISrepertory = repertory || "";

  var maincontent = document.getElementById("analysis-content");
  if (!maincontent) {
    return;
  }

  if (!repertory) {
    maincontent.innerHTML = "Choose a repertory from the above menu to view its parallel analysis.";
    return;
  }

  maincontent.innerHTML = "Processing...";
  $("body").css("cursor", "wait");

  ReadFileAsync(analysisDataUrl("parallel", repertory), function(responseText) {
    var target = document.getElementById("analysis-content");
    if (!target) {
      return;
    }
    target.innerHTML = responseText;
    $("body").css("cursor", "default");

    $(".d5p5").qtip({
      content: {
        text: "diminished fifth\nfollowed by a\nperfect fifth"
      }
    });

    $(".p5d5").qtip({
      content: {
        text: "perfect fifth\nfollowed by a\ndiminished fifth"
      }
    });

    $(".d5d5").qtip({
      content: {
        text: "diminished fifth\nfollowed by a\ndiminished fifth"
      }
    });
  });
}

document.addEventListener("DOMContentLoaded", function() {
  ensureAnalysisState();
  loadCgiParameters();
  window.addEventListener("keydown", analysisKeyDownFunction, false);
  displayContents(localStorage.ANALYSISrepertory || "");
});
</script>
