<script>
let WORKS = {% include metadata/works.json %};
let COMPOSERS = {% include metadata/composers.json %};
</script>
<script src="/analysis/scripts-common.js"></script>
<script>
function collectRangeSectionIds(repertory, genre, workId) {
  if (!repertory) {
    return [];
  }

  InitializeWorklist();
  const sectionIds = [];
  const seen = new Set();

  for (let i = 0; i < WORKLIST.length; i++) {
    const rep = WORKLIST[i];
    if (rep.repid !== repertory) {
      continue;
    }

    const works = rep.works || [];
    for (let j = 0; j < works.length; j++) {
      const work = works[j];

      if (genre && work.genre !== genre) {
        continue;
      }
      if (workId && work.id !== workId) {
        continue;
      }

      const sections = Array.isArray(work.sections) && work.sections.length
        ? work.sections.map(section => section.id).filter(Boolean)
        : [work.id];

      for (let k = 0; k < sections.length; k++) {
        const id = sections[k];
        if (!seen.has(id)) {
          seen.add(id);
          sectionIds.push(id);
        }
      }
    }
  }

  return sectionIds;
}

function getRangeLabel(sectionId) {
  if (!sectionId) {
    return "";
  }

  for (let i = 0; i < WORKS.length; i++) {
    const work = WORKS[i];
    if (work.WORK_ID !== sectionId) {
      continue;
    }

    const title = work.Title || sectionId;
    const subtitle = work.Subtitle || "";
    return subtitle ? (title + ", " + subtitle) : title;
  }

  return sectionId;
}

function getRepertoryLongName(repertory) {
  if (!repertory) {
    return "";
  }

  InitializeWorklist();
  for (let i = 0; i < WORKLIST.length; i++) {
    if (WORKLIST[i].repid === repertory) {
      return WORKLIST[i].comlong || repertory;
    }
  }
  return repertory;
}

function displayContents(repertory) {
  if (typeof repertory === "undefined" || repertory === null) {
    repertory = localStorage.ANALYSISrepertory || "";
  }
  buildRepertorySelect();
  $("#repertory").val(repertory);
  StylizeFormElements();
  showRepertory(repertory);
}

function showRepertory(repertory) {
  if (typeof repertory === "undefined" || repertory === null) {
    repertory = document.getElementById("repertory") ? document.getElementById("repertory").value : "";
  }

  localStorage.ANALYSISrepertory = repertory || "";

  var maincontent = document.getElementById("analysis-content");
  if (!maincontent) {
    return;
  }

  if (!repertory) {
    maincontent.innerHTML = "Choose a repertory from the above menu to view its range plots.";
    return;
  }

  const genre = localStorage.ANALYSISgenre || "";
  const work = localStorage.ANALYSISwork || "";
  const sectionIds = collectRangeSectionIds(repertory, genre, work);
  if (!sectionIds.length) {
    maincontent.innerHTML = "<p>No range plot files were found for the selected filters.</p>";
    return;
  }

  const repertoryLongName = getRepertoryLongName(repertory);
  let html = "";
  html += "<section style=\"margin: 0 0 1.5rem 0;\">";
  html += "<h3 class=\"brown-heading\" style=\"font-size:140%; margin-bottom:0.5rem;\">";
  html += "Vocal ranges in works by " + repertoryLongName;
  html += "</h3>";
  html += "<p style=\"margin:0.35rem 0; color:#736960; font-size:15px; line-height:1.32;\">";
  html += "The ranges in the left column shows the relative number of notes each voice plays for each pitch. ";
  html += "The large black noteheads indicate the highest and lowest pitch sung by the voice, and the small white notehead indicates the median pitch. ";
  html += "The ranges in the second column are weighted the note durations, so each bar in the historgram shows the relative duration for each pitch sung by the voice.";
  html += "</p>";
  html += "<div style=\"display:grid; grid-template-columns:repeat(2, minmax(0, 1fr)); gap:0.75rem; margin-top:1.75rem;\">";
  html += "<h4 style=\"margin:0; color:#736960; font-size:20px; line-height:1.2; font-weight:700;\">Ranges with note-attack histograms</h4>";
  html += "<h4 style=\"margin:0; color:#736960; font-size:20px; line-height:1.2; font-weight:700;\">Ranges with note-duration histograms</h4>";
  html += "</div>";
  html += "</section>";

  for (let i = 0; i < sectionIds.length; i++) {
    const sectionId = sectionIds[i];
    const label = getRangeLabel(sectionId);
    const attackSvg = getJosquinDataUrl(sectionId, "prange-attack");
    const durationSvg = getJosquinDataUrl(sectionId, "prange-duration");
    const attackFallbacks = getLegacyPlotFallbackList(sectionId, "prange-attack").join("||");
    const durationFallbacks = getLegacyPlotFallbackList(sectionId, "prange-duration").join("||");

    html += "<section style=\"margin: 0 0 2rem 0;\">";
    html += "<h3 class=\"brown-heading\" style=\"font-size:120%; margin-bottom:0.5rem;\">" + label + "</h3>";
    html += "<div style=\"display:grid; grid-template-columns:repeat(2, minmax(0, 1fr)); gap:0.75rem; align-items:start;\">";
    html += "<a href=\"" + attackSvg + "\" target=\"_blank\" rel=\"noopener\" style=\"display:block;\">";
    html += "<img src=\"" + attackSvg + "\" alt=\"Pitch range by attack for " + label + "\" style=\"width:100%; height:auto;\"";
    html += " data-fallbacks=\"" + attackFallbacks + "\" data-fallback-index=\"0\" onerror=\"useLegacyPlotFallback(this);\">";
    html += "</a>";
    html += "<a href=\"" + durationSvg + "\" target=\"_blank\" rel=\"noopener\" style=\"display:block;\">";
    html += "<img src=\"" + durationSvg + "\" alt=\"Pitch range by duration for " + label + "\" style=\"width:100%; height:auto;\"";
    html += " data-fallbacks=\"" + durationFallbacks + "\" data-fallback-index=\"0\" onerror=\"useLegacyPlotFallback(this);\">";
    html += "</a>";
    html += "</div>";
    html += "</section>";
  }

  maincontent.innerHTML = html;
}

document.addEventListener("DOMContentLoaded", function() {
  ensureAnalysisState();
  loadCgiParameters();
  window.addEventListener("keydown", analysisKeyDownFunction, false);
  displayContents(localStorage.ANALYSISrepertory || "");
});
</script>
