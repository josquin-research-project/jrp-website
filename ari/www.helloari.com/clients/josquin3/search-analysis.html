<!doctype html>
<html lang="en">	           
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=1010"/>
	<title>The Josquin Research Project</title>
	<!-- styles -->
	<link href='http://fonts.googleapis.com/css?family=Lato:400,700,400italic' rel='stylesheet' type='text/css'>
	<link href='http://fonts.googleapis.com/css?family=Lusitana:400,700' rel='stylesheet' type='text/css'>
	<link rel="stylesheet" type="text/css" href="css/normalize.css" />
	<link rel="stylesheet" type="text/css" href="css/style.css" />
	<!--[if lte IE 9]>
		<<link rel="stylesheet" type="text/css" href="css/ie9.css" />
	<![endif]-->

</head>


<body>
	<div class="page container" id="search-page">
		<header class="simple">
			<nav id="primary-nav">
				<ul>
					<li class="logo"><a href="#"><img src="images/logo-small.jpg" alt="Josquin Research Project"></a></li>
					<li><a href="#">Home</a></li>
					<li><a href="#">Browse</a></li>
					<li class="active"><a href="#">Search/Analysis</a></li>
					<li><a href="#">About JRP</a></li>                             
				</ul>
			</nav> <!-- primary-nav -->
		</header>
		<section id="content">
			<section id="search">
				<h2 class="blue-bar">Search <span class="info">info</span></h2>
				<form action="#">
					<div class="form-group">
						<input type="text" class="form-control" placeholder="Enter Pitch">
					</div>
					<div class="form-group">
						<input type="text" class="form-control" placeholder="Enter Interval">
					</div>
					<div class="form-group">
						<input type="text" class="form-control" placeholder="Enter Rhythm">
					</div>
					<div class="form-group">
						<select id="composers" data-placeholder="All Composers">
							<option label="default">All Composers</option>
							<option value="option1">option 1</option>
							<option value="option2">option2</option>
						</select>
					</div> <!-- form-group -->
					<div class="form-group">
						<select id="generes" data-placeholder="All Genre">
							<option label="default">All Genre</option>
							<option value="option1">option 1</option>
							<option value="option2">option2</option>
						</select>
					</div> <!-- form-group -->
					<div class="form-group">
						<select id="voices" data-placeholder="All Mensurations">
							<option label="default">All Mensurations</option>
							<option value="option1">option 1</option>
							<option value="option2">option2</option>
						</select>
					</div> <!-- form-group -->
					<div class="form-group">
						<label><input type="checkbox"> Editorial Accidentals</label>
					</div> <!-- form-group -->
					
					<div class="form-group text-center border-dotted">
						<button type="submit" class="btn btn-brown btn-medium">Search</button>
					</div> <!-- form-group -->
				</form>
			</section> <!-- search -->


			<section id="tools">
				<h2 class="blue-bar">ANALYSIS TOOLS <span class="info">info</span></h2>

				<div class="form-group">
					<select id="complete-repertory" data-placeholder="Complete Repertory">
						<option label="default">Complete Repertory</option>
						<option value="option1">option 1</option>
						<option value="option2">option 2</option>
					</select>
				</div> <!-- form-group -->
				<div class="form-group border-dotted">
					<ul>
						<li><a href="#" class="btn btn-brown btn-medium"><span>Activity <small>attacks per measure</small></span></a></li>
						<li><a href="#" class="btn btn-brown btn-medium"><span>Parallel <small>parallel perfect intervals</small></span></a></li>
						<li><a href="#" class="btn btn-brown btn-medium"><span>Rhythm <small>measure-long patterns</small></span></a></li>
						<li><a href="#" class="btn btn-brown btn-medium"><span>Range</span></a></li>
					</ul>
				</div> <!-- form-group -->
			</section> <!-- tools -->
			
		</section> <!-- content -->
		<footer>
			<nav class="secondary-nav">
				<ul>
					<li class="logo"><a href="#">Josquin Research Project</a></li>
					<li><a href="#">Feedback</a></li>
					<li><a href="#">Under the Hood</a></li>
					<li><a href="#">Contact</a></li>
				</ul>
			</nav> <!-- secondary-nav -->
		</footer>
	</div> <!-- page -->
	<!-- scripts -->
	<script type="text/javascript" src="scripts/jquery.js"></script>
	<script type="text/javascript" src="scripts/select2.js"></script>
	<script type="text/javascript" src="scripts/jquery.ezmark.min.js"></script>
	<script type="text/javascript" src="scripts/scripts.js"></script>
	<script type="text/javascript" src="scripts/placeholders.min.js"></script>	
</body>
</html>
