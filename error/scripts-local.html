<script>
document.addEventListener("DOMContentLoaded", function () {
  const form = document.getElementById("error-form");
  const statusEl = document.getElementById("status");
  const targetEl = document.getElementById("error_target");

  function isValidEmail(value) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);
  }

  function getParam(name) {
    return new URLSearchParams(window.location.search).get(name) || "";
  }

  function workUrl(workId) {
    return window.location.origin + "/work?id=" + encodeURIComponent(workId);
  }

  const workId = getParam("work") || sessionStorage.ERRORjrpid || "";
  const sourceUrl = getParam("url") || document.referrer || "";

  if (workId) {
    targetEl.value = workUrl(workId);
  } else if (sourceUrl) {
    targetEl.value = sourceUrl;
  }

  form.addEventListener("submit", function (event) {
    const description = form.querySelector("#error_description").value.trim();
    const email = form.querySelector("#error_email").value.trim();
    const humanCheck = form.querySelector("#error_human").value.trim();
    const reportedTarget = targetEl.value.trim() || window.location.href;

    if (!description || !email || !humanCheck) {
      event.preventDefault();
      statusEl.className = "feedback-status feedback-status--error";
      statusEl.textContent = "Please complete all required fields.";
      return;
    }

    if (!isValidEmail(email)) {
      event.preventDefault();
      statusEl.className = "feedback-status feedback-status--error";
      statusEl.textContent = "Please enter a valid email address.";
      return;
    }

    if (humanCheck.toLowerCase() !== "josquin") {
      event.preventDefault();
      statusEl.className = "feedback-status feedback-status--error";
      statusEl.textContent = "Please complete the human check.";
      return;
    }

    form.querySelector('[name="entry.270859303"]').value = reportedTarget;
    form.querySelector('[name="entry.2136692707"]').value = navigator.userAgent;

    statusEl.className = "feedback-status";
    statusEl.textContent = "Submitting error report...";

    setTimeout(() => {
      form.reset();
      statusEl.className = "feedback-status feedback-status--success";
      statusEl.textContent = "Thank you for your report.";
    }, 300);
  });
});
</script>
