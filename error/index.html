{% include_relative styles-local.html %}
{% include_relative scripts-local.html %}

<iframe name="hidden_iframe" style="display:none;"></iframe>

<article class="about">
  <h2 class="brown-heading">Report an Error</h2>
  <p>
    Use this form to report a problem with a work, score, metadata record, download, or page. Fields marked * are required.
  </p>

  <form
    id="error-form"
    class="feedback-form"
    action="https://docs.google.com/forms/d/e/1FAIpQLSftVWciboaVu-J2sf0Y0wMTX-6cU2uE4JItfzovCfD69f-wvg/formResponse"
    method="POST"
    target="hidden_iframe"
  >
    <!-- Backend category -->
    <input type="hidden" name="entry.594716763" value="Data problem">

    <div class="form-group">
      <label for="error_target">Work or page being reported</label>
      <input
        id="error_target"
        type="text"
        autocomplete="off"
        placeholder="Jos2721 or https://www.josqu.in/work?id=Jos2721"
      >
    </div>

    <div class="form-group">
      <label for="error_description">Description *</label>
      <textarea
        id="error_description"
        name="entry.1835674852"
        rows="10"
        required
        placeholder="Describe the problem..."
      ></textarea>
    </div>

    <div class="form-group">
      <label for="error_email">Email address *</label>
      <input
        id="error_email"
        name="entry.590265142"
        type="email"
        required
        autocomplete="email"
        placeholder="you@example.com"
      >
    </div>

    <div class="form-group">
      <label for="error_human">Human check: type Josquin *</label>
      <input
        id="error_human"
        type="text"
        required
        autocomplete="off"
        spellcheck="false"
        placeholder="Josquin"
      >
    </div>

    <!-- Hidden metadata -->
    <input type="hidden" name="entry.270859303" value="">
    <input type="hidden" name="entry.2136692707" value="">
    <input type="hidden" name="fvv" value="1">
    <input type="hidden" name="pageHistory" value="0">

    <button type="submit" class="btn btn-brown">
      Submit error report
    </button>

    <div id="status" class="feedback-status" aria-live="polite"></div>
  </form>
</article>
