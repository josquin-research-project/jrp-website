// Global variables:

var JRPID = "";

window.onload = function() {

   var CgiParameters = null;
   if (CgiParameters === null) {
      CgiParameters = getCgiParameters();
   }

   if (typeof CgiParameters['id'] !== "undefined") {
      JRPID = CgiParameters['id'];
   } else {
      JRPID = WORKjrpid;
   }

   displayWork(JRPID);
}



//////////////////////////////
//
// displayWork --
//

function displayWork(jrpid) {
   initializeWorklistFlat();

   var pieces = jrpid.match(/^([A-Z][a-z][a-z]\d{4}[.\d]*)([a-z]*.*)/);

   bread += "<li>";

   var referrer = document.referrer;
   referrer = referrer.replace(/index\.html/, "");
   var rtitle = "Back";
   if (referrer.match(/\/browse/)) {
      referrer = referrer.replace(/\/?\??home=true$/, "");
      rtitle = "Browse";
   }
   if (referrer.match(/\/search/)) {
      rtitle = "Search Results";
   }

   bread += "<a href=\"";
   bread += referrer;
   bread += "\">" + rtitle + "</a>";

   bread += "</li>\n";

   bread += "<li>" + title;

   }

   titleContent += "/data?a=notationNoEditWithText&f=" + jrpid;
   titleContent += "\">Score</a></li>\n";
   titleContent += "<li><a class=\"file-ed-orange\" href=\"";
   titleContent += "/data?a=notationWithText&f=" + jrpid;
   titleContent += "\">Score w/ ed. accidentals</a></li>\n";
   titleContent += "<li><a class=\"mp3\" href=\"#\">MP3</a></li>\n";

   // Set the incipit image ///////////////////////////////////////////////

      var musicarea = document.getElementById("music-area");

   // Set the vocal range  image //////////////////////////////////////////

   // Set the Downloads area //////////////////////////////////////////////

   download += "<div class=\"col first-col\">\n";
   download += "<ul>\n";
   download += "<li><a class=\"icon-file\" href=\"";

   download += "\">PDF score</a></li>\n";
   download += "<li><a class=\"icon-file-ed\" href=\"";
   download += "/data?a=notationWithText&f=" + jrpid;
   download += "\">PDF w/ ed. accidentals</a></li>\n";
   download += "<li><a class=\"icon-midi\" href=\"";
   download += "/data?a=midi&f=" + jrpid;
   download += "\">MIDI</a></li>\n";
   download += "</ul>\n";

   download += "<div class=\"col\">\n";
   download += "<ul>\n";
   download += "<li><a class=\"icon-file-list\" href=\"";
   download += "/data?a=humdrum&f=" + jrpid;
   download += "\">Humdrum</a></li>\n";
   download += "<li><a class=\"icon-list\" href=\"";
   download += "/data?a=musedata&f=" + jrpid;
   download += "\">MuseData</a></li>\n";
   download += "<li><a class=\"icon-list\" href=\"";
   download += "/data?a=notearray&f=" + jrpid;
   download += "\">NoteArray</a></li>\n";
   download += "</ul>\n";
   download += "</div>\n";

   download += "<div class=\"col\">\n";
   download += "<ul>\n";
   download += "<li><a class=\"icon-file-list\" href=\"";
   download += "/data?a=musicxml&f=" + jrpid;

   download += "<li><a class=\"icon-list\" href=\"";

}



//////////////////////////////
//
// process Window keys down:
//

window.addEventListener('keydown', function(e) {
   var E	= window.event? event : e;
   var keycode  = E.keyCode;
   var unicode  = E.charCode ? E.charCode : E.keyCode;
   var key      = String.fromCharCode(unicode);
   var output   = '';


   if (keycode == ControlKey) {
      ControlKeyState = 1;
   } else if (keycode == ShiftKey) {
      ShiftKeyState = 1;
   } else if (keycode == AltKey) {
      AltKeyState = 1;
   } else if (keycode == CommandLeftKey) {
      CommandKeyState = 1;
   } else if (keycode == CommandRightKey) {
      CommandKeyState = 1;
   }
  
   // don't process any command- key combinations.
   if (CommandKeyState == 1) {
      return;
   }

   var titlebox = document.getElementById("titlebox");

   if (ControlKeyState == 1) {
      switch (keycode) {
         case BackspaceKey:
         case DeleteKey:
            titlebox.value = '';
            browseDisplay();
            break;
         case NKey:
            CountInfo = !CountInfo;
            if (CountInfo && (WORKCOUNT > 0)) {
               showCountInfo();
            } else if (!CountInfo) {
               hideCountInfo();
            }
            break;
      }
//   } else if (ShiftKeyState == 1) {  // shift pressed without control key
// Can't used ShiftKeyState due to else statement.
   } else if (AltKeyState == 1) {
   } else {
      if ((keycode >= AKey && keycode <= ZKey)) {
         if (titlebox != document.activeElement) {
            var character = String.fromCharCode(keycode);
            if (!ShiftKeyState) {
               character = character.toLowerCase();
            }
            titlebox.value += character;
            browseDisplay();
         }
      } else if (titlebox != document.activeElement) {
         // What to do out of titlebox focus
         switch (keycode) {
            case SpaceKey:
               titlebox.value += String.fromCharCode(keycode);
               break;
            case DeleteKey:
            case BackspaceKey:
               var str = titlebox.value;
               titlebox.value = str.slice(0, -1);
               browseDisplay();
            // add apostrophe here...
         }
      } else {
         // What to do in titlebox focus
      }
   }
}
);



//////////////////////////////
//
// Process window key ups --
//

window.onkeyup = function(e) {
   var E       = window.event? event : e;
   var keycode = E.keyCode;

   if (keycode == ControlKey) {
      ControlKeyState = 0;
   } else if (keycode == ShiftKey) {
      ShiftKeyState = 0;
   } else if (keycode == AltKey) {
      AltKeyState = 0;
   } else if (keycode == CommandLeftKey) {
      CommandKeyState = 0;
   } else if (keycode == CommandRightKey) {
      CommandKeyState = 0;
   }
}



//////////////////////////////
//
// Prevent backspace from being interpreted by the web browser:
//
// Maybe deal with by using: event.preventDefault() in window
//     key processing code.
//

trapfunction = function(event) {
   var E	= window.event? event : e;
   var keycode  = E.keyCode;
   if (keycode == BackspaceKey) {
      var titlebox = document.getElementById("titlebox");
      var str = titlebox.value;
      titlebox.value = str.slice(0, -1);
      return false;
   }
   return event;
}
document.onkeydown  = trapfunction; // Most browsers
document.onkeypress = trapfunction; // Opera
