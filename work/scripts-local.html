function generateBreadcrumbs(title, composer, workid) {
	var bread = "<ul>\n";
	bread += "<li>";

	var referrer = document.referrer;
	referrer = referrer.replace(/index\.html/, "");
	var rtitle = "Back";
	if (referrer.match(/\/browse/)) {
		referrer = referrer.replace(/\/?\??home=true$/, "");
		rtitle = "Browse";
	}
	if (referrer.match(/\/search/)) {
		rtitle = "Search Results";
	}

	bread += "<a href=\"";
	bread += referrer;
	bread += "\">" + rtitle + "</a>";

	bread += "</li>\n";

	bread += "<li style=\"margin-top:5px; font-size:100%;\">" + title;
	if (composer != "Anonymous") {
		bread += " (" + composer + ")"
	}
	bread += "</li>\n";
	bread += "<ul>\n";
 
   return bread;
}

/////////////////////////////
//
// Setup enter key to start search.
//

function setupSearchOnEnter() {

	$("#pitch")	.focus(function() { $(this).data("hasfocus", true);});
	$("#interval").focus(function() { $(this).data("hasfocus", true);});
	$("#rhythm")  .focus(function() { $(this).data("hasfocus", true);});

	$("#pitch")	.blur(function()  { $(this).data("hasfocus", false);});
	$("#interval").blur(function()  { $(this).data("hasfocus", false);});
	$("#rhythm")  .blur(function()  { $(this).data("hasfocus", false);});

	$(document.body).keyup(function(ev) {
		if (ev.which === EnterKey) {
			if		($("#pitch")	.data("hasfocus")) { doSearch(); }
			else if ($("#interval").data("hasfocus")) { doSearch(); }
			else if ($("#rhythm")  .data("hasfocus")) { doSearch(); }
		}
	});

}



//////////////////////////////
//
// hasMultipleSections --
//

function hasMultipleSections(jrpid) {
   InitializeWorklist();
   var i, j, k;
	var works;
   for (i=0; i<WORKLIST.length; i++) {
		if (!jrpid.match(WORKLIST[i].repid)) {
			continue;
		}
		works = WORKLIST[i].works;
		for (j=0; j<works.length; j++) {
			if (!jrpid.match(works[j].id)) {
				continue;
			}
			if (jrpid == works[j].id) {
				// The JRPID is a work-level id. Check to see if there are
				// any sections.
				if (typeof works[j].sections === 'undefined') {
					return false;
				} else {
					return true;
				}
			} else {
				// The JRPID is a section-level id.  Check to see if there
				// are any sections which match to this id; otherwise, keep
				// searching the work list
				if (typeof works[j].sections === 'undefined') {
					continue;
				} else {
					for (k=0; k<works[j].sections.length; k++) {
						if (jrpid != works[j].sections[k].id) {
							continue;
						}
						return true;
					}
				}
			}
		}
		break;
	}

   return false;
}

//
// Setup enter key to start search.
//

function setupSearchOnEnter() {

	$("#pitch")	.focus(function() { $(this).data("hasfocus", true);});
	$("#interval").focus(function() { $(this).data("hasfocus", true);});
	$("#rhythm")  .focus(function() { $(this).data("hasfocus", true);});

	$("#pitch")	.blur(function()  { $(this).data("hasfocus", false);});
	$("#interval").blur(function()  { $(this).data("hasfocus", false);});
	$("#rhythm")  .blur(function()  { $(this).data("hasfocus", false);});

	$(document.body).keyup(function(ev) {
		if (ev.which === EnterKey) {
			if		($("#pitch")	.data("hasfocus")) { doSearch(); }
			else if ($("#interval").data("hasfocus")) { doSearch(); }
			else if ($("#rhythm")  .data("hasfocus")) { doSearch(); }
		}
	});
}



//////////////////////////////
//
// doSearch --
//

function doSearch() {
	var pitch	  = document.getElementById("pitch");
	var interval  = document.getElementById("interval");
	var rhythm	 = document.getElementById("rhythm");
	var composers = document.getElementById("composers");
	var genres	 = document.getElementById("genres");

	var empty = 0;
	if (pitch.value.match(/^\s*$/)) {
		empty += 1;
	} 
	if (interval.value.match(/^\s*$/)) {
		empty += 1;
	} 
	if (rhythm.value.match(/^\s*$/)) {
		empty += 1;
	}

	if (empty == 3) {
		var empty2 = 0;
		if (composers.value.match(/^\s*$/) || composers.value.match(/All/i)) {
			empty2 += 1;
		} 
		if (genres.value.match(/^\s*$/) || genres.value.match(/All/i)) {
			empty2 += 1;
		} 

		if (empty2 == 2) {
			displayContents();
			return;
		} else {
			localStorage.BROWSEcomposers = composers.value;
			localStorage.BROWSEgenres	 = genres.value;
			localStorage.BROWSEvoices	 = "";
			localStorage.BROWSEhome		= "false";
			window.location.href = "/browse";
			return;
		}
	}

	var c = composers.value;
	if (c.match(/All/i)) {
		c = "";
	}
	var g = genres.value;
	if (g.match(/All/i)) {
		g = "";
	}

	var searchparam = "";
	if (c != "") {
		searchparam += "&composer=" + encodeURIComponent(c);
	}
	if (g != "") {
		searchparam += "&genre=" + encodeURIComponent(g);
	}
	if (pitch.value != "") {
		searchparam += "&pitch=" + encodeURIComponent(pitch.value);
	}
	if (rhythm.value != "") {
		searchparam += "&rhythm=" + encodeURIComponent(rhythm.value);
	}
	if (interval.value != "") {
		searchparam += "&interval=" + encodeURIComponent(interval.value);
	}

	// The search-results page will look at sessionStorage.QUERY.  If it find
	// that it has content, then it will run the query and display the results.
	var QUERY = {};
	QUERY.composer = c;
	QUERY.genre	 = g;
	QUERY.pitch	 = pitch.value;
	QUERY.rhythm	= rhythm.value;
	QUERY.interval = interval.value;
	sessionStorage.QUERY = JSON.stringify(QUERY);

	window.location.href = "/search-results";
	return;
}

//////////////////////////////
//
// getRangeAsync --
//

function getRangeAsync(jrpid) {
	if (!WORKallranges) {
		// if not showing all ranges
      if (jrpid != localStorage.WORKjrpid) {
			// not the range to show, so don't do anything
			return;
		}
   }

	if (!!RANGES[jrpid]) {
 		var area = document.getElementById("range_" + jrpid);
		if (!!area) { 
			area.style.height = ""; 
	  		area.innerHTML = RANGES[jrpid];
		}
      document.getElementById("vocal-ranges").style.height = "";
		return;
	}

	document.getElementById("range_" + jrpid).style.height = RANGENULLHEIGHT;
   document.getElementById("vocal-ranges").style.height = "";

   var allranges = WORKallranges;
   if (allranges) {
		if (WORKrangedur) {
			action = "prange-dur-labeled-svg";
		} else {
			action = "prange-labeled-svg";
		}
	} else {
		if (WORKrangedur) {
			action = "prange-dur-svg";
		} else {
			action = "prange-svg";
		}
	}
	ReadFileAsync("/data?a=" + action + "&id=" + jrpid, function(responseText) {
		var data = responseText;
		RANGES[jrpid] = responseText;
     	getRangeAsync(jrpid);
	});
}

//
// getIncipitAsync --
//

function getIncipitAsync(jrpid) {
	if (!WORKallincipits) {
		// if not showing all incipits
      if (jrpid != localStorage.WORKjrpid) {
			// not the incipit to show, so don't do anything
			return;

//////////////////////////////
//
// process Window keys down:
//

window.addEventListener('keydown', function(event) {

   if (event.metaKey) {
		// Don't mess with meta key (command key in OS X)
      return;
   }

	switch (event.keyCode) {

		case CKey:
			ClearWorklistCache();
			break;

		case DKey:
			if ($(event.target).is('input') && (!event.ctrlKey)) {
				// Ignore space command if typing input
				// Use shift-space in that case to stop.
				return;
			}
			event.preventDefault();
			event.stopPropagation();
			toggleRangeByDuration();
			break;

		case IKey:
			if ($(event.target).is('input') && (!event.ctrlKey)) {
				// Ignore space command if typing input
				// Use shift-space in that case to stop.
				return;
			}
			event.preventDefault();
			event.stopPropagation();
			toggleIncipitDisplay();
			break;

		case RKey:
			if ($(event.target).is('input') && (!event.ctrlKey)) {
				// Ignore space command if typing input
				// Use shift-space in that case to stop.
				return;
			}
			event.preventDefault();
			event.stopPropagation();
			toggleRangeDisplay();
			break;

		case SKey:
			if ($(event.target).is('input') && (!event.ctrlKey)) {
				// Ignore space command if typing input
				// Use shift-space in that case to stop.
				return;
			}
			event.preventDefault();
			event.stopPropagation();
			toggleTitleType();
			break;

		case RightArrowKey:
			if (event.shiftKey) {
				if (event.ctrlKey) {
					displayNextRepertoryPage();
				} else {
					displayNextWorkPage();
				}
			}
			break;

		case LeftArrowKey:
			if (event.shiftKey) {
				if (event.ctrlKey) {
					displayPreviousRepertoryPage();
				} else {
					displayPreviousWorkPage();
				}
			}
			break;

		case UpArrowKey:
			if (event.shiftKey) {
				if (!SECTIONS || SECTIONS.length < 2) {
					break;
				}

				var i;
				var si = -1;
				for (i=0; i<SECTIONS.length; i++) {
					if (SECTIONS[i].id == localStorage.WORKjrpid) {
						si = i;
						break;
					}
				}

				var ocount = SECTIONS.length;
				var current = si;

				// display previous section of multisection work
				if (si < 0) {
					var ocount = $('select#select-section option').length;
					var current = $('select#select-section option:selected').index();
				}
				current--;
				if (current < 0) {
					current = ocount - 1;
				}
				var sectionid = SECTIONS[current].id;
				$('select#select-section').prop('selectedIndex', current);
				displaySection(sectionid);
				UpdateEzMark();

			}
			break;

		case DownArrowKey:
			if (event.shiftKey) {
				displayNextSection();
			}
			break;

		case OneKey:
			if ($(event.target).is('input') && (!event.ctrlKey)) {
				// Ignore space command if typing input
				// Use shift-space in that case to stop.
				return;
			}
			event.preventDefault();
			event.stopPropagation();
			displaySectionNumber(1);
			break;

		case TwoKey:
			if ($(event.target).is('input') && (!event.ctrlKey)) {
				// Ignore space command if typing input
				// Use shift-space in that case to stop.
				return;
			}
			event.preventDefault();
			event.stopPropagation();
			displaySectionNumber(2);
			break;

		case ThreeKey:
			if ($(event.target).is('input') && (!event.ctrlKey)) {
				// Ignore space command if typing input
				// Use shift-space in that case to stop.
				return;
			}
			event.preventDefault();
			event.stopPropagation();
			displaySectionNumber(3);
			break;

		case FourKey:
			if ($(event.target).is('input') && (!event.ctrlKey)) {
				// Ignore space command if typing input
				// Use shift-space in that case to stop.
				return;
			}
			event.preventDefault();
			event.stopPropagation();
			displaySectionNumber(4);
			break;

		case FiveKey:
			if ($(event.target).is('input') && (!event.ctrlKey)) {
				// Ignore space command if typing input
				// Use shift-space in that case to stop.
				return;
			}
			event.preventDefault();
			event.stopPropagation();
			displaySectionNumber(5);
			break;

		case SixKey:
			if ($(event.target).is('input') && (!event.ctrlKey)) {
				// Ignore space command if typing input
				// Use shift-space in that case to stop.
				return;
			}
			event.preventDefault();
			event.stopPropagation();
			displaySectionNumber(6);
			break;

		case SevenKey:
			if ($(event.target).is('input') && (!event.ctrlKey)) {
				// Ignore space command if typing input
				// Use shift-space in that case to stop.
				return;
			}
			event.preventDefault();
			event.stopPropagation();
			displaySectionNumber(7);
			break;

		case EightKey:
			if ($(event.target).is('input') && (!event.ctrlKey)) {
				// Ignore space command if typing input
				// Use shift-space in that case to stop.
				return;
			}
			event.preventDefault();
			event.stopPropagation();
			displaySectionNumber(6);
			break;

		case NineKey:
			if ($(event.target).is('input') && (!event.ctrlKey)) {
				// Ignore space command if typing input
				// Use shift-space in that case to stop.
				return;
			}
			event.preventDefault();
			event.stopPropagation();
			displaySectionNumber(9);
			break;

		case PKey:
			if ($(event.target).is('input') && (!event.ctrlKey)) {
				// Ignore space command if typing input
				// Use shift-space in that case to stop.
				return;
			}
			event.preventDefault();
			event.stopPropagation();
			PlayAudioFile(localStorage.WORKjrpid, document.getElementById("audio_" + localStorage.WORKjrpid));
			break;

		case SpaceKey:
			if ($(event.target).is('input') && (!event.shiftKey) && (!event.ctrlKey)) {
				// Ignore space command if typing input
				// Use shift-space in that case to stop.
				return;
			}
			event.preventDefault();
			event.stopPropagation();
			if (!AUDIO) {
				break;
			}
			if (!AUDIOid) {
				break;
			}
			if (AUDIO.paused) {
				var audiobutton = document.getElementById(AUDIOid);
				if (!!audiobutton) {
					if (audiobutton.className.match(/mp3/)) {
						audiobutton.className = "mp3pause";
					} else {
						audiobutton.className = "pause";
					}
				}
				AUDIO.play();
			} else {
				var audiobutton = document.getElementById(AUDIOid);
				if (!!audiobutton) {
					if (audiobutton.className.match(/mp3/)) {
						audiobutton.className = "mp3play";
					} else {
						audiobutton.className = "play";
					}
				}
				AUDIO.pause();
			}
			return false;
			break;

		case HomeKey:
			if (event.shiftKey) {
				InitializeWorklist();
				localStorage.WORKjrpid = WORKLIST[0].works[0].id;
				displayWork(localStorage.WORKjrpid);
				return false;
			}
			break;

		case EndKey:
			if (event.shiftKey) {
				InitializeWorklist();
				localStorage.WORKjrpid = WORKLIST[WORKLIST.length-1]
					.works[WORKLIST[WORKLIST.length-1].works.length-1].id;
				displayWork(localStorage.WORKjrpid);
				return false;
			}
			break;

	}
});



//////////////////////////////
//
// displayNextSection --
//

function displayNextSection() {

	if (!SECTIONS || SECTIONS.length < 2) {
		return;
	}

	var i;
	var si = -1;
	for (i=0; i<SECTIONS.length; i++) {
		if (SECTIONS[i].id == localStorage.WORKjrpid) {
			si = i;
			break;
		}
	}

	var ocount = SECTIONS.length;
	var current = si;
	
	if (si < 0) {
		// display next section of multisection work
		ocount = $('select#select-section option').length;
		current = $('select#select-section option:selected').index();
	}
	current++;
	if (current > ocount-1) {
		current = 0;
	}
	var sectionid = SECTIONS[current].id;
	$('select#select-section').prop('selectedIndex', current);
	displaySection(sectionid);
	UpdateEzMark();
}



//////////////////////////////
//
// displaySectionNumber --
//

function displaySectionNumber(sectionnum) {
	if (SECTIONS.length < 2) {
		// not a multi-sectiond work
		return;
	}
	var ocount = SECTIONS.length;
	var si     = sectionnum - 1;

   if ((si < 0) || (si >= SECTIONS.length)) {
		// not a valid section
		return;
	}

	if (si < 0) {
		// display next section of multisection work
		ocount = $('select#select-section option').length;
		si = $('select#select-section option:selected').index();
	}
	if (si > ocount-1) {
		si = 0;
	}
	var sectionid = SECTIONS[si].id;
	$('select#select-section').prop('selectedIndex', si);
	displaySection(sectionid);
	UpdateEzMark();
}
