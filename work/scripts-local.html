// generateBreadcrumbs -- Set the breadcrumb area.
//

function generateBreadcrumbs(title, composer, workid) {
	var bread = "<ul>\n";
	bread += "<li>";

	var referrer = document.referrer;
	referrer = referrer.replace(/index\.html/, "");
	var rtitle = "Back";
	if (referrer.match(/\/browse/)) {
		referrer = referrer.replace(/\/?\??home=true$/, "");
		rtitle = "Browse";
	} else if (referrer.match(/\/search/)) {
		rtitle = "Search Results";
	} else if (referrer.match(/https?:\/\/[^\/]+\/?$/)) {
		rtitle = "Home";
	}

	bread += "<a href=\"";
	bread += referrer;
	bread += "\">" + rtitle + "</a>";

	bread += "</li>\n";

	bread += "<li style=\"margin-top:5px; font-size:100%;\">" + title;
	if (composer != "Anonymous") {
		bread += " (" + composer + ")"
	}
	bread += "</li>\n";
	bread += "<ul>\n";
 
	return bread;
}

//////////////////////////////
//
// getOptionList --
//

function getOptionList(sections) {
  if (!Array.isArray(sections)) return "";

  let out = "";

  for (let i = 0; i < sections.length; i++) {
    const s = sections[i];
    if (!s || !s.id) continue;

    // prefer stitle, fall back to subtitle, then id
    let title = s.stitle || s.subtitle || s.id;

    title = String(title).replace(/_/g, " ");

    out += `<option value="${s.id}">${title}</option>\n`;
  }

  return out;
}



//////////////////////////////
//
// getMovementNavHtml -- Create section links for multi-section works.
//

function getMovementNavHtml(currentid, modifierClass) {
	if (!Array.isArray(SECTIONS) || SECTIONS.length < 2) {
		return "";
	}

	var currentMovementId = getCurrentMovementId(currentid);
	var baseId = getBaseWorkId(currentid);
	var classes = "work-movement-nav";
	if (modifierClass) {
		classes += " " + modifierClass;
	}

	var out = "<nav class=\"" + classes + "\" aria-label=\"Work movements\">\n";
	var completeActive = currentMovementId === baseId;

	out += "<a class=\"work-movement-link work-movement-link--complete";
	if (completeActive) {
		out += " is-active";
	}
	out += "\"";
	if (completeActive) {
		out += " aria-current=\"true\"";
	}
	out += " href=\"" + getMovementSectionHref(baseId) + "\"";
	out += " onclick=\"return displayMovementSection('";
	out += escapeJs(baseId) + "', event);\">";
	out += "Complete work</a>\n";

	for (var i=0; i<SECTIONS.length; i++) {
		var section = SECTIONS[i];
		if (!section || !section.id) {
			continue;
		}

		var active = section.id === currentMovementId;
		var activeClass = active ? " is-active" : "";
		var ariaCurrent = active ? " aria-current=\"true\"" : "";
		var label = escapeWorkHtml(getMovementTitle(section));

		out += "<a class=\"work-movement-link" + activeClass + "\"";
		out += ariaCurrent;
		out += " href=\"" + getMovementSectionHref(section.id) + "\"";
		out += " onclick=\"return displayMovementSection('";
		out += escapeJs(section.id) + "', event);\">";
		out += label + "</a>\n";
	}

	out += "</nav>\n";
	return out;
}



//////////////////////////////
//
// getCurrentMovementId -- Resolve the selected movement or complete-work id.
//

function getCurrentMovementId(currentid) {
	if (!Array.isArray(SECTIONS) || SECTIONS.length < 1) {
		return currentid;
	}

	if (currentid === getBaseWorkId(currentid)) {
		return currentid;
	}

	for (var i=0; i<SECTIONS.length; i++) {
		if (SECTIONS[i].id === currentid) {
			return currentid;
		}
	}

	return getBaseWorkId(currentid);
}



//////////////////////////////
//
// getMovementTitle -- Prefer the section label already used by work pages.
//

function getMovementTitle(section) {
	var title = section.stitle || section.subtitle || section.id || "";
	title = String(title).replace(/_/g, " ").trim();
	if (title.match(/^Agnus$/i)) {
		return "Agnus dei";
	}
	return title;
}



//////////////////////////////
//
// getMovementSectionHref -- Stable fallback URL for movement links.
//

function getMovementSectionHref(sectionid) {
	return "/work/?id=" + encodeURIComponent(sectionid) + "#incipit";
}



//////////////////////////////
//
// displayMovementSection -- Switch sections in place without changing scroll.
//

function displayMovementSection(sectionid, event) {
	if (event && event.preventDefault) {
		event.preventDefault();
	}
	if (!sectionid) {
		return false;
	}

	var scrollTop = window.pageYOffset || document.documentElement.scrollTop || 0;
	displaySection(sectionid);
	updateMovementSectionUrl(sectionid);
	restoreScrollPosition(scrollTop);
	return false;
}



//////////////////////////////
//
// updateMovementSectionUrl -- Keep copy/share URL aligned with selection.
//

function updateMovementSectionUrl(sectionid) {
	if (!window.history || !window.history.replaceState) {
		return;
	}
	window.history.replaceState(null, "", getMovementSectionHref(sectionid));
}



//////////////////////////////
//
// restoreScrollPosition -- Movement links should not reposition the page.
//

function restoreScrollPosition(scrollTop) {
	window.scrollTo(window.pageXOffset || 0, scrollTop);
	window.setTimeout(function() {
		window.scrollTo(window.pageXOffset || 0, scrollTop);
	}, 250);
}



//////////////////////////////
//
// escapeWorkHtml -- Escape strings used in generated work-page HTML.
//

function escapeWorkHtml(value) {
	return String(value || "")
		.replace(/&/g, "&amp;")
		.replace(/</g, "&lt;")
		.replace(/>/g, "&gt;")
		.replace(/"/g, "&quot;");
}



//////////////////////////////
//
// escapeJs -- Escape strings used in inline handlers.
//

function escapeJs(value) {
	return String(value || "").replace(/\\/g, "\\\\").replace(/'/g, "\\'");
}



/////////////////////////////
//
// Setup enter key to start search.
//

function setupSearchOnEnter() {

	$("#pitch")   .focus(function() { $(this).data("hasfocus", true);});
	$("#interval").focus(function() { $(this).data("hasfocus", true);});
	$("#rhythm")  .focus(function() { $(this).data("hasfocus", true);});

	$("#pitch")   .blur(function()  { $(this).data("hasfocus", false);});
	$("#interval").blur(function()  { $(this).data("hasfocus", false);});
	$("#rhythm")  .blur(function()  { $(this).data("hasfocus", false);});

	$(document.body).keyup(function(ev) {
		if (ev.which === EnterKey) {
			if      ($("#pitch")   .data("hasfocus")) { doSearch(); }
			else if ($("#interval").data("hasfocus")) { doSearch(); }
			else if ($("#rhythm")  .data("hasfocus")) { doSearch(); }
		}
	});

}

//
// displayHumdrumIncipit -- Render a Verovio/Humdrum score preview. Complete
//     multi-section works load the first movement as an incipit, then render
//     each movement separately when expanded.
//

function displayHumdrumIncipit(jrpid, sections) {
	var area = document.getElementById("music-area");
	if (!area) {
		return;
	}

	var completeWork = getCompleteHumdrumWork(jrpid);

	if (WORKscoreCurrentId !== jrpid) {
		WORKscoreExpanded = false;
		WORKscoreCurrentId = jrpid;
	}

	var token = ++WORKscoreRequestToken;
	var statusId = "work-score-status";

	clearHumdrumScoreEntries(WORKscoreSourcePrefix);
	area.innerHTML = "";
	area.style.height = "";
	area.style.marginRight = "0";
	area.style.marginTop = "0";
	area.style.marginBottom = WORKscoreExpanded ? "20px" : "-45px";

	var panel = document.createElement("div");
	panel.className = WORKscoreExpanded
		? "work-score-panel work-score-panel--expanded"
		: "work-score-panel work-score-panel--preview";

	var status = document.createElement("div");
	status.id = statusId;
	status.className = "work-score-status";
	status.textContent = "Loading score...";
	panel.appendChild(status);

	var toolbar = document.createElement("div");
	toolbar.className = "work-score-toolbar text-right";
	toolbar.style.display = "none";
	toolbar.style.marginRight = "63px";
	toolbar.style.marginTop = "0";
	toolbar.innerHTML = "<div class=\"work-score-toolbar-left\">"
		+ getRangeToggleButtonHtml()
		+ "</div>";
	if (!WORKscoreExpanded) {
		toolbar.innerHTML += "<div class=\"work-score-toolbar-right\">"
			+ "<span class=\"btn btn-brown btn-small\" "
			+ "onclick=\"toggleCompleteScore();\">Show complete score</span>"
			+ "</div>";
	}

	area.appendChild(panel);
	area.appendChild(toolbar);
	updateScoreToggleButton();

	if (completeWork && WORKscoreExpanded) {
		loadCompleteHumdrumScores(completeWork).then(function(scores) {
			if (token !== WORKscoreRequestToken) {
				return;
			}
			if (!scores || !scores.length) {
				status.className = "work-score-status work-score-status--error";
				status.textContent = "Score preview unavailable.";
				return;
			}
			status.textContent = "";
			status.style.display = "none";
			toolbar.style.display = "flex";
			renderCompleteHumdrumScore(panel, scores, completeWork);
		}).catch(function(error) {
			if (token !== WORKscoreRequestToken) {
				return;
			}
			status.className = "work-score-status work-score-status--error";
			status.textContent = "Score preview unavailable.";
			console.error("Unable to render complete Humdrum score", error);
		});
		return;
	}

	var previewId = completeWork ? getCompleteHumdrumPreviewId(completeWork, jrpid) : jrpid;
	var sourceId = WORKscoreSourcePrefix;
	var script = document.createElement("script");
	script.type = "text/x-humdrum";
	script.id = sourceId;
	panel.appendChild(script);

	loadHumdrumScore(previewId).then(function(score) {
		if (token !== WORKscoreRequestToken) {
			return;
		}
		if (!score) {
			status.className = "work-score-status work-score-status--error";
			status.textContent = "Score preview unavailable.";
			return;
		}
		status.textContent = "";
		status.style.display = "none";
		toolbar.style.display = "flex";
		script.textContent = score.text;
		renderHumdrumScore(sourceId);
	}).catch(function(error) {
		if (token !== WORKscoreRequestToken) {
			return;
		}
		status.className = "work-score-status work-score-status--error";
		status.textContent = "Score preview unavailable.";
		console.error("Unable to render Humdrum score", error);
	});
}



//////////////////////////////
//
// clearHumdrumScoreEntry -- The Humdrum plugin caches entries by id.  Since
//     this work-page score is rebuilt when switching works or toggling the
//     complete score, clear the old cached entry before creating fresh DOM.
//

function clearHumdrumScoreEntry(sourceId) {
	var entry = window.HNP && HNP.entries ? HNP.entries[sourceId] : null;
	if (entry) {
		if (entry._resizeObserver) {
			entry._resizeObserver.disconnect();
		}
		if (entry._resizeCallback) {
			clearInterval(entry._resizeCallback);
		}
		if (entry._timer) {
			clearTimeout(entry._timer);
		}
		delete HNP.entries[sourceId];
	}

	var container = document.getElementById(sourceId + "-container");
	if (container) {
		container.remove();
	}
}



//////////////////////////////
//
// clearHumdrumScoreEntries -- Clear the single preview score and any separate
//     complete-work movement scores from the Humdrum plugin cache.
//

function clearHumdrumScoreEntries(sourcePrefix) {
	clearHumdrumScoreEntry(sourcePrefix);

	if (window.HNP && HNP.entries) {
		var keys = Object.keys(HNP.entries);
		for (var i=0; i<keys.length; i++) {
			if (keys[i].indexOf(sourcePrefix + "-") === 0) {
				clearHumdrumScoreEntry(keys[i]);
			}
		}
	}
}



//////////////////////////////
//
// renderHumdrumScore -- Ask the Humdrum Notation Plugin / Verovio to render
//     the script tag filled by loadHumdrumScore().
//

function renderHumdrumScore(sourceId) {
	if (typeof displayHumdrum !== "function") {
		console.error("Humdrum notation plugin is not loaded.");
		return;
	}

	var options = {
		source: sourceId,
		scale: 35,
		pageHeight: WORKscoreExpanded ? 60000 : 650,
		pageMarginTop: 20,
		pageMarginLeft: 40,
		pageMarginRight: 40,
		spacingLinear: WORKscoreExpanded ? 0.36 : 0.24,
		spacingNonLinear: 0.45,
		spacingSystem: WORKscoreExpanded ? 10 : 4,
		mnumInterval: 5,
		autoResize: "true",
		postFunction: resetHeight
	};

	displayHumdrum(options);
}

//////////////////////////////
//
// loadHumdrumScore -- Try data.josqu.in first, then GitHub raw fallback.
//

async function loadHumdrumScore(jrpid) {
	return await loadHumdrumScoreFromCandidates(getHumdrumScoreCandidates(jrpid));
}



//////////////////////////////
//
// loadHumdrumScoreFromCandidates -- Return the first valid Humdrum score.
//

async function loadHumdrumScoreFromCandidates(candidates) {
	if (!Array.isArray(candidates)) {
		return null;
	}

	for (var i=0; i<candidates.length; i++) {
		try {
			var response = await fetch(candidates[i].url, { cache: "no-cache" });
			if (!response.ok) {
				continue;
			}
			var text = await response.text();
			if (isHumdrumScoreText(text)) {
				return {
					source: candidates[i].source,
					url: candidates[i].url,
					text: text
				};
			}
		} catch (error) {
			console.warn("Could not load Humdrum candidate", candidates[i].url, error);
		}
	}

	return null;
}



//////////////////////////////
//
// getCompleteHumdrumWork -- Complete-work views use the conceptual work id.
//

function getCompleteHumdrumWork(jrpid) {
	const baseId = getBaseWorkId(jrpid);
	var work = WORKLISTjrpid[baseId] || WORKLISTjrpid[jrpid];

	if (!work || !Array.isArray(work.sections) || work.sections.length < 2) {
		return null;
	}

	if (jrpid !== work.id && jrpid !== baseId) {
		return null;
	}

	return work;
}



//////////////////////////////
//
// getCompleteHumdrumPreviewId -- Use the first movement as the incipit-style
//     preview when the complete work is selected.
//

function getCompleteHumdrumPreviewId(work, jrpid) {
	if (work && Array.isArray(work.sections) && work.sections.length) {
		return work.sections[0].id || jrpid;
	}
	return jrpid;
}



//////////////////////////////
//
// loadCompleteHumdrumScores -- Load each movement separately so Verovio does
//     not stop after the first terminating Humdrum interpretation.
//

async function loadCompleteHumdrumScores(work) {
	var entries = [];

	if (!work || !Array.isArray(work.sections)) {
		return entries;
	}

	for (var i=0; i<work.sections.length; i++) {
		var section = work.sections[i];
		if (!section || !section.id) {
			continue;
		}

		var score = await loadHumdrumScoreFromCandidates(getHumdrumScoreCandidates(section.id));
		if (!score) {
			console.warn("Could not load Humdrum movement", section.id);
			continue;
		}
		entries.push({
			section: section,
			score: score
		});
	}

	return entries;
}



//////////////////////////////
//
// renderCompleteHumdrumScore -- Render each movement in its own Humdrum script
//     tag and Verovio call.
//

function renderCompleteHumdrumScore(panel, entries, work) {
	for (var i=0; i<entries.length; i++) {
		var entry = entries[i];
		var section = entry.section || {};
		var movement = document.createElement("div");
		movement.className = "work-score-movement";

		var title = document.createElement("div");
		title.className = "work-score-movement-title";
		title.textContent = getCompleteScoreMovementLabel(work, section);
		movement.appendChild(title);

		var sourceId = WORKscoreSourcePrefix + "-" + i;
		var script = document.createElement("script");
		script.type = "text/x-humdrum";
		script.id = sourceId;
		script.textContent = entry.score.text;
		movement.appendChild(script);

		panel.appendChild(movement);
		renderHumdrumScore(sourceId);
	}
}



//////////////////////////////
//
// getCompleteScoreMovementLabel -- Match the range-page pattern:
//     "Work title, Movement title".
//

function getCompleteScoreMovementLabel(work, section) {
	var title = work && work.title ? String(work.title).trim() : "";
	var movement = getMovementTitle(section);

	if (title && movement) {
		return title + ", " + movement;
	}
	return title || movement || (section && section.id) || "";
}



//////////////////////////////
//
// getHumdrumScoreCandidates -- Data endpoint first, then GitHub metadata file.
//

function getHumdrumScoreCandidates(jrpid) {
	var candidates = [];
	var section = getHumdrumSectionInfo(jrpid);

	addHumdrumCandidate(candidates, {
		source: "data",
		url: getJosquinDataUrl(jrpid, "humdrum")
	});

	if (section.id && section.id !== jrpid) {
		addHumdrumCandidate(candidates, {
			source: "data",
			url: getJosquinDataUrl(section.id, "humdrum")
		});
	}

	if (section.filename) {
		addHumdrumCandidate(candidates, {
			source: "github",
			url: getGithubHumdrumUrl(section.filename)
		});
	}

	return candidates;
}



function addHumdrumCandidate(candidates, candidate) {
	if (!candidate.url) {
		return;
	}
	for (var i=0; i<candidates.length; i++) {
		if (candidates[i].url === candidate.url) {
			return;
		}
	}
	candidates.push(candidate);
}



function getHumdrumSectionInfo(jrpid) {
	const baseId = getBaseWorkId(jrpid);
	var work = WORKLISTjrpid[baseId] || WORKLISTjrpid[jrpid];
	var info = {
		id: jrpid,
		filename: ""
	};

	if (!work) {
		return info;
	}

	if (work.filename) {
		info.filename = work.filename;
	}

	if (work.sections && work.sections.length) {
		var section = null;
		for (var i=0; i<work.sections.length; i++) {
			if (work.sections[i].id === jrpid) {
				section = work.sections[i];
				break;
			}
		}
		if (!section) {
			section = work.sections[0];
		}
		info.id = section.id || jrpid;
		info.filename = section.filename || info.filename;
	}

	return info;
}



function getGithubHumdrumUrl(filename) {
	var matches = filename.match(/^([A-Z][a-z][a-z])/);
	if (!matches) {
		return "";
	}

	return "https://raw.githubusercontent.com/josquin-research-project/"
		+ matches[1] + "/main/" + filename.split("/").map(encodeURIComponent).join("/");
}



function isHumdrumScoreText(text) {
	return !!(text && text.match(/\*\*kern/));
}

//////////////////////////////
//
// doSearch --
//

function doSearch() {
	var pitch	  = document.getElementById("pitch");
	var interval  = document.getElementById("interval");
	var rhythm	  = document.getElementById("rhythm");
	var composers = document.getElementById("composers");
	var genres	  = document.getElementById("genres");

	var empty = 0;
	if (pitch.value.match(/^\s*$/)) {
		empty += 1;
	} 
	if (interval.value.match(/^\s*$/)) {
		empty += 1;
	} 
	if (rhythm.value.match(/^\s*$/)) {
		empty += 1;
	}

	if (empty == 3) {
		var empty2 = 0;
		if (composers.value.match(/^\s*$/) || composers.value.match(/All/i)) {
			empty2 += 1;
		} 
		if (genres.value.match(/^\s*$/) || genres.value.match(/All/i)) {
			empty2 += 1;
		} 

		if (empty2 == 2) {
			// displayContents();
			return;
		} else {
			sessionStorage.BROWSEcomposers = composers.value;
			sessionStorage.BROWSEgenres	 = genres.value;
			sessionStorage.BROWSEvoices	 = "";
			sessionStorage.BROWSEhome		= "false";
			window.location.href = "/repertoire/";
			return;
		}
	}

	var c = composers.value;
	if (c.match(/All/i)) {
		c = "";
	}
	var g = genres.value;
	if (g.match(/All/i)) {
		g = "";
	}

	var searchparam = "";
	if (c != "") {
		searchparam += "&composer=" + encodeURIComponent(c);
	}
	if (g != "") {
		searchparam += "&genre=" + encodeURIComponent(g);
	}
	if (pitch.value != "") {
		searchparam += "&pitch=" + encodeURIComponent(pitch.value);
	}
	if (rhythm.value != "") {
		searchparam += "&rhythm=" + encodeURIComponent(rhythm.value);
	}
	if (interval.value != "") {
		searchparam += "&interval=" + encodeURIComponent(interval.value);
	}

	scope = 'repertory';
	var inputs = document.querySelectorAll('input[name="searchscope"]');
	var i;
	for (i=0; i<inputs.length; i++) {
		if (inputs[i].getAttribute('value') !== "work") {
			continue;
		}
		var paren = inputs[i].parentNode;
		if (paren.className.match("ez-selected")) {
			scope = 'work';
		}
	}

	// The search-results page will look at sessionStorage.QUERY.  If it find
	// that it has content, then it will run the query and display the results.
	var query = {};
	query.composer = c;
	query.genre	 = g;
	query.pitch	 = pitch.value;
	query.rhythm	= rhythm.value;
	query.interval = interval.value;
	query.scope    = scope;
	if (scope === 'work') {
		if (JRPID.match(/^Tas/)) {
			// Tasso works include a letter in the work id.
			query.jrpid = JRPID.match(/^([A-Z][a-z][a-z]\d{4}[.\d]*[a-z]+)/)[1];
		} else {
			query.jrpid = JRPID.match(/^([A-Z][a-z][a-z]\d{4}[.\d]*)/)[1];
		}
	}
	sessionStorage.QUERY = JSON.stringify(query);
	QUERY = query;

	if (scope === 'repertory') {
		window.location.href = "/search-results/";
		return;
	} else {
		doWorkSearch(QUERY);
	}
}


//////////////////////////////
//
// doWorkSearch -- Do a search on a single work, and display the
// 	results on the current page.
//

function doWorkSearch(query) {
	var pitch     = query.pitch;
	var interval  = query.interval;
	var rhythm    = query.rhythm;
	var composers = query.composer;
	var genres    = query.genre;
	var work      = query.jrpid;

	var searchparam = "";
	if (composers != "") {
		searchparam += "&composer=" + encodeURIComponent(composers);
	}
	if (genres != "") {
		searchparam += "&genre=" + encodeURIComponent(genres);
	}
	if (pitch != "") {
		searchparam += "&pitch=" + encodeURIComponent(pitch);
	}
	if (rhythm != "") {
		searchparam += "&rhythm=" + encodeURIComponent(rhythm);
	}
	if (interval != "") {
		searchparam += "&interval=" + encodeURIComponent(interval);
	}
	if (work != "") {
		searchparam += "&work=" + encodeURIComponent(work);
	}

	$("body").css("cursor", "wait");

	var dataloc = JOSQUIN_LEGACY.replace(/\/+$/, "") + "/cgi-bin/jrp";

	var request = new XMLHttpRequest();
	request.open('GET', dataloc + "?a=searchwork" + searchparam, true);
	request.addEventListener('load', function(event) {
		if (this.status !== 200) {
			return;
		}
		displayWorkSearch(this.responseText);
	}, false);
	request.send();
}



//////////////////////////////
//
// displayWorkSearch --
//

function displayWorkSearch(searchresults) {
	$("body").css("cursor", "default");
	var SR = JSON.parse(searchresults);

   var resultsarea = document.getElementById("work-search-results");
   var debug = "<textarea rows=1 cols=1 style='font-size:75%;'>" 
	debug += searchresults + "</textarea>";

 	var content = "";

   var heading = "";
   heading = "<h3 class='search-header'>";
	if (SR.matchcount == 0) {
		heading += "No matches";
	} else {
		heading += SR.matchcount + " match";
		if (parseInt(SR.matchcount) != 1) {
			heading += "es";
		}
	}
	heading += "</h3>";

	var template;
	var content = "";
	var source = "";
	if (SR.matchcount > 0) {
		if (SECTIONS && SECTIONS.length > 0) {
			source = document.getElementById("multi-search-results-table");
		} else {
			source = document.getElementById("single-search-results-table");
		}
		template = Handlebars.compile(source.textContent);
		content = template(SR);
	}

	// resultsarea.innerHTML = heading + content + debug;
	resultsarea.innerHTML = heading + content;


}

// getRangeAsync --
//

function getRangeAsync(jrpid) {
	if (shouldShowAllRangePlots(jrpid)) {
		if (WORKrangesVisible) {
			showAllRanges();
		}
		return;
	}

	var workid = jrpid.match(/^([A-Z][a-z][a-z]\d{4}[.\d]*)/)[1];
	if (!WORKallranges) {
		// if not showing all ranges
		if ((jrpid != sessionStorage.WORKjrpid) &&
				(workid != sessionStorage.WORKjrpid)) {
			// not the range to show, so don't do anything
			return;
		}
	}

	var area = document.getElementById("range_" + jrpid);
	if (!area) {
		return;
	}

	if (!RANGES[jrpid]) {
		RANGES[jrpid] = getRangePlotHtml(jrpid);
	}

	showRangeSection();
	area.style.height = "";
	area.innerHTML = RANGES[jrpid];
}

// getRangePlotHtml -- Work pages use the static range plots on data.josqu.in.
//

function getRangePlotHtml(jrpid) {
	var plotType = WORKrangedur ? "prange-duration" : "prange-attack";
	var url = getJosquinDataUrl(jrpid, plotType);
	var label = WORKrangedur ? "duration" : "note-count";
	var plotLabel = getRangePlotLabel(jrpid);
	var alt = "Vocal range " + label + " plot for " + jrpid;
	var html = "";

	html += "<div class=\"work-range-plot\">";
	if (plotLabel) {
		html += "<h3 class=\"work-range-plot-title\">";
		html += escapeWorkHtml(plotLabel);
		html += "</h3>";
	}
	html += "<div class=\"vocal-wrap\">";
	html += "<object class=\"work-range-svg\" data=\"" + url + "\" ";
	html += "type=\"image/svg+xml\" aria-label=\"" + escapeWorkHtml(alt) + "\" ";
	html += "onload=\"showLoadedRangeImage(this);\" ";
	html += "onerror=\"hideMissingRangeImage(this);\">";
	html += "<a href=\"" + url + "\" target=\"_blank\" rel=\"noopener\">";
	html += escapeWorkHtml(alt);
	html += "</a>";
	html += "</object>";
	html += "</div>";
	html += "</div>\n";

	return html;
}



//////////////////////////////
//
// getRangePlotLabel -- Match the range analysis page: "Title, Movement".
//

function getRangePlotLabel(jrpid) {
	var baseId = getBaseWorkId(jrpid);
	var work = WORKLISTjrpid[baseId] || WORKLISTjrpid[jrpid];
	var title = work && work.title ? String(work.title).trim() : "";
	var movement = "";

	if (work && Array.isArray(work.sections)) {
		for (var i=0; i<work.sections.length; i++) {
			if (work.sections[i].id === jrpid) {
				movement = getMovementTitle(work.sections[i]);
				break;
			}
		}
	}

	if (title && movement) {
		return title + ", " + movement;
	}
	return title || movement || jrpid;
}



//////////////////////////////
//
// showRangeSection -- Keep the work-page vocal range area available while
//     respecting the collapsed/expanded panel state.
//

function showRangeSection() {
	var vrange = document.querySelector("#vocal-ranges");
	if (vrange) {
		vrange.style.display = "";
		vrange.style.height = "";
	}
	var rangebutton = document.querySelector("#range-button");
	if (rangebutton) {
		rangebutton.style.display = "";
	}
	updateRangePanelVisibility();
}



//////////////////////////////
//
// updateRangePanelVisibility -- Sync the panel and toggle button.
//

function updateRangePanelVisibility() {
	var panel = document.getElementById("work-range-panel");
	if (panel) {
		if (WORKrangesVisible) {
			panel.className = panel.className.replace(/\bis-hidden\b/g, "").trim();
			panel.style.display = "";
		} else {
			if (!panel.className.match(/\bis-hidden\b/)) {
				panel.className += " is-hidden";
			}
			panel.style.display = "none";
		}
	}

	var toggle = document.getElementById("work-range-toggle");
	if (toggle) {
		if (WORKrangesVisible) {
			if (!toggle.className.match(/\bis-active\b/)) {
				toggle.className += " is-active";
			}
			toggle.textContent = "Hide vocal ranges";
			toggle.setAttribute("aria-expanded", "true");
		} else {
			toggle.className = toggle.className.replace(/\bis-active\b/g, "").trim();
			toggle.textContent = "Show vocal ranges";
			toggle.setAttribute("aria-expanded", "false");
		}
	}
}



//////////////////////////////
//
// showLoadedRangeImage -- Keep the range section visible when the SVG loads.
//

function showLoadedRangeImage(img) {
	showRangeSection();
}



//////////////////////////////
//
// hideMissingRangeImage -- Hide a missing static range plot without falling
//     back to the old website.
//

function hideMissingRangeImage(img) {
	var wrap = img && img.closest ? img.closest(".work-range-plot") : null;
	if (!wrap && img && img.closest) {
		wrap = img.closest(".vocal-wrap");
	}
	if (wrap) {
		wrap.style.display = "none";
	}
}

//
// getIncipitAsync --
//

function getIncipitAsync(jrpid) {
return;
	var workid = jrpid.match(/^([A-Z][a-z][a-z]\d{4}[.\d]*)/)[1];
	if (!WORKallincipits) {
		// if not showing all incipits
		if ((jrpid != sessionStorage.WORKjrpid) &&
				(workid != sessionStorage.WORKjrpid)) {
			// not the incipit to show, so don't do anything
			return;
		}
	}

	if (!!INCIPITS[jrpid]) {
 		var area = document.getElementById("incipit_" + jrpid);
		area.style.height = "";
		document.getElementById("music-area").style.height = "";
	  	var imgtext = "<img src=\"" + INCIPITS[jrpid] 
		imgtext += "\" alt=\"music placeholder\">";
	  	area.innerHTML = imgtext;
		return;
	}

	var incipit = document.getElementById("incipit_" + jrpid);
	if (!incipit) {
		incipit = document.getElementById("incipit_" + jrpid + "a");
	}

	document.getElementById("incipit_" + jrpid).style.height = "200px";
	document.getElementById("music-area").style.height = "";
	var action = "incipit-mime";
	ReadFileAsync("{{site.jrp-data-url}}?a=" + action + "&id=" + jrpid, function(responseText) {
		var data = responseText;
		INCIPITS[jrpid] = responseText;

	  	getIncipitAsync(jrpid);
	});
}



//////////////////////////////
//
// getIncipitAsyncMultiple --
//

function getIncipitAsyncMultiple(jrpid, sections) {
return;
	if (!sections) {
		getIncipitAsync(jrpid);
		return;
	}
	var counter = 0;
	for (var i=0; i<sections.length; i++) {
		if (WORKallincipits) {
			getIncipitAsync(sections[i].id);
			counter++;
		} else if (jrpid == sections[i].id) {
			getIncipitAsync(sections[i].id);
			counter++;
		}
	}
	if (sections && (sections.length > 0) && (counter == 0)) {
		getIncipitAsync(sections[0].id);
	}
}



//////////////////////////////
//
// getRangeAsyncMultiple --
//

function getRangeAsyncMultiple(jrpid, sections) {
	if (!sections || sections.length < 2) {
		getRangeAsync(jrpid);
	}
	var counter = 0;
	for (var i=0; i<sections.length; i++) {
		if (WORKallranges) {
			getRangeAsync(sections[i].id);
			counter++;
		} else if (jrpid == sections[i].id) {
			getRangeAsync(sections[i].id);
			counter++;
		}
	}
	if (sections && (sections.length > 0) && (counter == 0)) {
		getRangeAsync(sections[0].id);
	}
}



//////////////////////////////
//
// displayNextSection --
//

function displayNextSection() {

	if (!SECTIONS || SECTIONS.length < 2) {
		return;
	}

	var i;
	var si = -1;
	for (i=0; i<SECTIONS.length; i++) {
		if (SECTIONS[i].id == sessionStorage.WORKjrpid) {
			si = i;
			break;
		}
	}

	var ocount = SECTIONS.length;
	var current = si;
	
	if (si < 0) {
		// display next section of multisection work
		ocount = $('select#select-section option').length;
		current = $('select#select-section option:selected').index();
	}
	current++;
	if (current > ocount-1) {
		current = 0;
	}
	var sectionid = SECTIONS[current].id;
	$('select#select-section').prop('selectedIndex', current);
	if (SECTIONS && (MENUINDEX == 0)) {
		var downloads = document.getElementById("downloads");
		if (downloads) {
			downloads.textContent = "";
		}
	}
	displaySection(sectionid);
	StylizeFormElements();
}



//////////////////////////////
//
// displaySectionNumber --
//

function displaySectionNumber(sectionnum) {
	if (SECTIONS.length < 2) {
		// not a multi-sectioned work
		return;
	}
	var ocount = SECTIONS.length;
	var si     = sectionnum - 1;

	if ((si < 0) || (si >= SECTIONS.length)) {
		// not a valid section
		return;
	}

	if (si < 0) {
		// display next section of multisection work
		ocount = $('select#select-section option').length;
		si = $('select#select-section option:selected').index();
	}
	if (si > ocount-1) {
		si = 0;
	}
	var sectionid = SECTIONS[si].id;
	$('select#select-section').prop('selectedIndex', si);
	if (SECTIONS && (MENUINDEX == 0)) {
		var downloads = document.getElementById("downloads");
		if (downloads) {
			downloads.textContent = "";
		}
	}
	displaySection(sectionid);
	StylizeFormElements();
}
