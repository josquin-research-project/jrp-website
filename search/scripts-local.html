// Description:   JavaScript management of the JRP data searches.
//


// Used to display extra info:
var SEARCHhome  = null;
var SEARCHLIST  = null;



//////////////////////////////
//
// window.onload == what to do after the page has been loaded.
//

window.onload = function() {
   localStorage.removeItem(SEARCHLIST);
   displayContents();
}



//////////////////////////////
//
// displayContents --
//

function displayContents() {
   var maincontent = document.getElementById('content');
   if (!maincontent) {
      return;
   }
   if (SEARCHhome == null) {
      if (typeof localStorage.SEARCHhome === 'undefined') {
         SEARCHhome = readFile('content.html');
         localStorage.SEARCHhome = SEARCHhome;
      } else {
         SEARCHhome = localStorage.SEARCHhome;
      }
   }
   maincontent.innerHTML = SEARCHhome;
   buildComposerSelect();
   buildGenreSelect();
   // updateEzMark(); // already done in buildComposerSelect & buildGenreSelect
}



//////////////////////////////
//
// doSearch --
//

function doSearch() {
   var pitch     = document.getElementById("pitch");
   var interval  = document.getElementById("interval");
   var rhythm    = document.getElementById("rhythm");
   var composers = document.getElementById("composers");
   var genres    = document.getElementById("genres");

   tablecontent = document.getElementById("search-results-table");
   if (tablecontent != null) {
      tablecontent.innerHTML = "Searching...";
   } else {
      maincontent = document.getElementById("content");
      maincontent.innerHTML = "Searching...";
   }

   var empty = 0;
   if (pitch.value.match(/^\s*$/)) {
      empty += 1;
   } 
   if (interval.value.match(/^\s*$/)) {
      empty += 1;
   } 
   if (pitch.value.match(/^\s*$/)) {
      empty += 1;
   }

   if (empty == 3) {
      var empty2 = 0;
      if (composers.value.match(/^\s*$/) || composers.value.match(/All/i)) {
         empty2 += 1;
      } 
      if (genres.value.match(/^\s*$/) || genres.value.match(/All/i)) {
         empty2 += 1;
      } 

      if (empty2 == 2) {
         displayContents();
         return;
      } else {
         localStorage.BROWSEcomposers = composers.value;
         localStorage.BROWSEgenres    = genres.value;
         localStorage.BROWSEvoices    = "";
         localStorage.BROWSEtitlebox  = "";
         localStorage.BROWSEhome      = "false";
         window.location.href = "/browse";
         return;
      }
   }

   var c = composers.value;
   if (c.match(/All/i)) {
      c = "";
   }
   var g = genres.value;
   if (g.match(/All/i)) {
      g = "";
   }

   var searchparam = "";
   if (c != "") {
      searchparam += "&composer=" + encodeURIComponent(c);
   }
   if (g != "") {
      searchparam += "&genre=" + encodeURIComponent(g);
   }
   if (pitch.value != "") {
      searchparam += "&pitch=" + encodeURIComponent(pitch.value);
   }
   if (rhythm.value != "") {
      searchparam += "&rhythm=" + encodeURIComponent(rhythm.value);
   }
   if (interval.value != "") {
      searchparam += "&interval=" + encodeURIComponent(interval.value);
   }

   sessionStorage.SEARCHLIST = readFile("/data?a=search" + searchparam);
   
   window.location.href = "/searchresults";
   return;
}



//////////////////////////////
//
// buildComposerSelect
//

function buildComposerSelect() {
   var composerselect = document.getElementById("composers-select");
   if (composerselect == null) {
      return;
   }

   var output = "<select id=\"composers\"";
   output += " data-placeholder=\"All Composers\">\n";
   output += "<option label=\"default\">All Composers</option>\n";
   var clist = getComposerOptions();
   output += clist;
   output += "</select>\n";
   composerselect.innerHTML = output;


   var composerselect2 = document.getElementById("composers-select2");
   if (composerselect2 == null) {
      updateEzMark();
      return;
   }

   output  = "<select id=\"complete-repertory\" ";
   output += "data-placeholder=\"Josquin des Prez\">\n";
   output += clist;
   output += "</select>\n";
   composerselect2.innerHTML = output;

   updateEzMark();
}



//////////////////////////////
//
// buildGenreSelect --
//

function buildGenreSelect() {
   var genreselect = document.getElementById("genres-select");
   if (genreselect == null) {
      return;
   }

   var output = "<select id=\"genres\"";
   output += " data-placeholder=\"All Genres\">\n";
   output += "<option label=\"default\">All Genres</option>\n";
   output += getGenreOptions();
   genreselect.innerHTML = output;
   updateEzMark();
}


</script>
