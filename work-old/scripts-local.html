//
// generateBreadcrumbs -- Set the breadcrumb area.
//

function generateBreadcrumbs(title, composer) {
	var bread = "<ul>\n";
	bread += "<li>";

	var referrer = document.referrer;
	referrer = referrer.replace(/index\.html/, "");
	var rtitle = "Back";
	if (referrer.match(/\/browse/)) {
		referrer = referrer.replace(/\/?\??home=true$/, "");
		rtitle = "Browse";
	}
	if (referrer.match(/\/search/)) {
		rtitle = "Search Results";
	}

	bread += "<a href=\"";
	bread += referrer;
	bread += "\">" + rtitle + "</a>";

	bread += "</li>\n";

	bread += "<li>" + title;
	if (composer != "Anonymous") {
		bread += " (" + composer + ")"
	}
	bread += "</li>\n";
	bread += "<ul>\n";

   return bread;
}

//////////////////////////////
//
// getOptionList --
//

function getOptionList(sections) {
   var output = "";

   var variant = sections[0].variant;
	var i;
   for (i=1; i<sections.length; i++) {
		if (typeof variant === 'undefined') {
			variant = null;
			break;
		}
		if (sections[i].variant != variant) {
			variant = null;
		}
	}
	if (typeof variant === 'undefined') {
		variant = null;
	}

   var id;
	for (i=0; i<sections.length; i++) {
		id = sections[i].id;
		output += "<option value=\"" + sections[i].id + "\"";
		output += ">";
		// convert underscores to spaces in WORKLIST generator:
		sections[i].stitle = sections[i].stitle.replace(/_/g, " ");
		output += sections[i].stitle;
		if ((typeof sections[i].variant !== 'undefined')
		   	&& (sections[i].variant != variant)) {
			// convert underscores to spaces in WORKLIST generator:
			sections[i].variant = sections[i].variant.replace(/_/g, " ");
			output += " (" + sections[i].variant + ")";
		}
		output += "</option>\n";
	}


	return output;
}

//////////////////////////////
//
// hasMultipleSections --
//

function hasMultipleSections(jrpid) {
   initializeWorklist();
   var i, j, k;
	var works;
   for (i=0; i<WORKLIST.length; i++) {
		if (!jrpid.match(WORKLIST[i].repid)) {
			continue;
		}
		works = WORKLIST[i].works;
		for (j=0; j<works.length; j++) {
			if (!jrpid.match(works[j].id)) {
				continue;
			}
			if (jrpid == works[j].id) {
				// The JRPID is a work-level id. Check to see if there are
				// any sections.
				if (typeof works[j].sections === 'undefined') {
					return false;
				} else {
					return true;
				}
			} else {
				// The JRPID is a section-level id.  Check to see if there
				// are any sections which match to this id; otherwise, keep
				// searching the work list
				if (typeof works[j].sections === 'undefined') {
					continue;
				} else {
					for (k=0; k<works[j].sections.length; k++) {
						if (jrpid != works[j].sections[k].id) {
							continue;
						}
						return true;
					}
				}
			}
		}
		break;
	}

   return false;
}

function prepareIncipitArea(jrpid, sections) {

		// set up single incipit display
		output += "<div id=\"incipit_" + jrpid + "\"></div>\n";
   } else {
		// set up multiple incipit display
		for (var i=0; i<sections.length; i++) {
		   output += "<div style=\"height:0;\" id=\"incipit_" + sections[i].id + "\"></div>\n";
		}
		output += "<div id=\"incipit-button\"></div>\n";
   }
   area.innerHTML = output;
	area.style.height = "200px";  // Give a dummy height until the next
											// incipit is shown.  This prevents
											// annoying jumping of text around on page.
	if (!!sections) {
   	showIncipitButton();

}

//////////////////////////////
//
// doSearch --
//

function doSearch() {
	var pitch	  = document.getElementById("pitch");
	var interval  = document.getElementById("interval");
	var rhythm	 = document.getElementById("rhythm");
	var composers = document.getElementById("composers");
	var genres	 = document.getElementById("genres");

	var empty = 0;
	if (pitch.value.match(/^\s*$/)) {
		empty += 1;
	} 
	if (interval.value.match(/^\s*$/)) {
		empty += 1;
	} 
	if (rhythm.value.match(/^\s*$/)) {
		empty += 1;
	}

	if (empty == 3) {
		var empty2 = 0;
		if (composers.value.match(/^\s*$/) || composers.value.match(/All/i)) {
			empty2 += 1;
		} 
		if (genres.value.match(/^\s*$/) || genres.value.match(/All/i)) {
			empty2 += 1;
		} 

		if (empty2 == 2) {
			displayContents();
			return;
		} else {
			localStorage.BROWSEcomposers = composers.value;
			localStorage.BROWSEgenres	 = genres.value;
			localStorage.BROWSEvoices	 = "";
			localStorage.BROWSEhome		= "false";
			window.location.href = "/browse";
			return;
		}
	}

	var c = composers.value;
	if (c.match(/All/i)) {
		c = "";
	}
	var g = genres.value;
	if (g.match(/All/i)) {
		g = "";
	}

	var searchparam = "";
	if (c != "") {
		searchparam += "&composer=" + encodeURIComponent(c);
	}
	if (g != "") {
		searchparam += "&genre=" + encodeURIComponent(g);
	}
	if (pitch.value != "") {
		searchparam += "&pitch=" + encodeURIComponent(pitch.value);
	}
	if (rhythm.value != "") {
		searchparam += "&rhythm=" + encodeURIComponent(rhythm.value);
	}
	if (interval.value != "") {
		searchparam += "&interval=" + encodeURIComponent(interval.value);
	}

	// The search-results page will look at sessionStorage.QUERY.  If it find
	// that it has content, then it will run the query and display the results.
	var QUERY = {};
	QUERY.composer = c;
	QUERY.genre	 = g;
	QUERY.pitch	 = pitch.value;
	QUERY.rhythm	= rhythm.value;
	QUERY.interval = interval.value;
	sessionStorage.QUERY = JSON.stringify(QUERY);

	window.location.href = "/search-results";
	return;
}

function displayNextWorkPage() {
	initializeWorklistFlat();
   SECTIONS = [];
	var entry;
	var nextone = 0;
	var first;
   var base = localStorage.WORKjrpid.match(/^([A-Z][a-z][a-z][\d.]+)/)[1];

	for (entry in WORKLISTjrpid) {
		if (!WORKLISTjrpid.hasOwnProperty(entry)) {
			continue;
		}
		if (typeof first === 'undefined') {
			first = entry;
		}
		if (nextone > 0) {
			localStorage.WORKjrpid = entry;
			displayWork(localStorage.WORKjrpid, true);
			return false;
		}
		if (entry.match(localStorage.WORKjrpid)) {
			nextone = 1;
		} else if (entry.match(base)) {
			nextone = 1;
		}
	}

	if (typeof first !== 'undefined') {
		localStorage.WORKjrpid = first;
		displayWork(localStorage.WORKjrpid, true);
		return false;
	}
}

function getRangeAsync(jrpid) {
	if (!!RANGES[jrpid]) {
	  	var output = "<h3 class=\"brown-border\">Vocal Ranges</h3>\n";
	  	output += "<span class=\"orange-text\">mouse-over";
		output += " to see note counts</span>\n";
	  	output += "<span class=\"vocal-wrap\">";
	  	output += RANGES[jrpid];
	  	output += "</span>\n";
	  	var rangearea = document.getElementById("vocal-ranges");
	  	rangearea.innerHTML = output;
		return;
	}

	var action = "prange-svg";
	readFileAsync("/data?a=" + action + "&id=" + jrpid, function(responseText) {
		var rangedata = responseText;
		var rangearea = document.getElementById("vocal-ranges");
		if (rangedata.match(/^\s*Error/)) {
			rangearea.innerHTML = "";	
			return;
		}
		RANGES[jrpid] = rangedata;
		if (rangedata != "") {
			var output = "<h3 class=\"brown-border\">Vocal Ranges</h3>\n";
			output += "<span class=\"orange-text\">";
			output += "mouse-over to see note counts</span>\n";
			output += "<span class=\"vocal-wrap\">";
			output += rangedata;
			output += "</span>\n";
			rangearea.innerHTML = output;
		}
	});
}

//////////////////////////////
//
// process Window keys down:
//

window.addEventListener('keydown', function(e) {
	var E	= window.event? event : e;
	var keycode  = E.keyCode;
	var unicode  = E.charCode ? E.charCode : E.keyCode;
	var key		= String.fromCharCode(unicode);
	var output	= '';

	if (keycode == ControlKey) {
		ControlKeyState = 1;
	} else if (keycode == ShiftKey) {
		ShiftKeyState = 1;
	} else if (keycode == AltKey) {
		AltKeyState = 1;
	} else if (keycode == CommandLeftKey) {
		CommandKeyState = 1;
	} else if (keycode == CommandRightKey) {
		CommandKeyState = 1;
	}

	switch (keycode) {
		case IKey:
			if (ControlKeyState) {
				toggleIncipitDisplay();
			}
			break;

		case RightArrowKey:
			if (ShiftKeyState) {
				if (ControlKeyState) {
					displayNextRepertoryPage();
				} else {
					displayNextWorkPage();
				}
			}
			break;

		case LeftArrowKey:
			if (ShiftKeyState) {
				if (ControlKeyState) {
					displayPreviousRepertoryPage();
				} else {
					displayPreviousWorkPage();
				}
			}
			break;

		case UpArrowKey:
			if (ShiftKeyState) {
				if (SECTIONS.length < 2) {
					break;
				}
				// display previous section of multisection work
				var ocount = $('select#select-section option').length;
				var current = $('select#select-section option:selected').index();
				current--;
				if (current < 0) {
					current = ocount - 1;
				}
				var sectionid = SECTIONS[current].id;
				$('select#select-section').prop('selectedIndex', current);
				displaySection(sectionid);
				updateEzMark();

			}
			break;

		case DownArrowKey:
			if (ShiftKeyState) {
				if (SECTIONS.length < 2) {
					break;
				}
				// display next section of multisection work
				var ocount = $('select#select-section option').length;
				var current = $('select#select-section option:selected').index();
				current++;
				if (current > ocount-1) {
					current = 0;
				}
				var sectionid = SECTIONS[current].id;
				$('select#select-section').prop('selectedIndex', current);
				displaySection(sectionid);
				updateEzMark();
			}
			break;

		case HomeKey:
			if (ShiftKeyState) {
				initializeWorklist();
				localStorage.WORKjrpid = WORKLIST[0].works[0].id;
				displayWork(localStorage.WORKjrpid);
				return false;
			}
			break;

		case EndKey:
			if (ShiftKeyState) {
				initializeWorklist();
				localStorage.WORKjrpid = WORKLIST[WORKLIST.length-1]
					.works[WORKLIST[WORKLIST.length-1].works.length-1].id;
				displayWork(localStorage.WORKjrpid);
				return false;
			}
			break;

	}
});

//

window.onkeyup = function(e) {
	var E		 = window.event? event : e;
	var keycode = E.keyCode;

	if (keycode == ControlKey) {
		ControlKeyState = 0;
	} else if (keycode == ShiftKey) {
		ShiftKeyState = 0;
	} else if (keycode == AltKey) {
		AltKeyState = 0;
	} else if (keycode == CommandLeftKey) {
		CommandKeyState = 0;
	} else if (keycode == CommandRightKey) {
		CommandKeyState = 0;
	}
}
