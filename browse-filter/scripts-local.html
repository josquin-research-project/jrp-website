document.addEventListener("DOMContentLoaded", function() {
	var CgiParameters = GetCgiParameters();

	var home = CgiParameters['home'];
	if (home && !home.match(/false/i)) {
		sessionStorage.BROWSEhome = "true";
	} else {
		sessionStorage.BROWSEhome = "false";
	}

   var composers = CgiParameters['c'];
	if (composers && !composers.match(/^\s*$/)) {
		sessionStorage.BROWSEcomposers = composers;
	} else {
		sessionStorage.BROWSEcomposers = "";
   }

   var genres = CgiParameters['g'];
	if (genres && !genres.match(/^\s*$/)) {
		sessionStorage.BROWSEgenres = genres;
	} else {
		sessionStorage.BROWSEgenres = "";
   }

   var voices = CgiParameters['v'];
	if (voices && !voices.match(/^\s*$/)) {
		sessionStorage.BROWSEvoices = voices;
	} else {
		sessionStorage.BROWSEvoices = "";
   }

   var titlebox = CgiParameters['t'];
	if (titlebox && !titlebox.match(/^\s*$/)) {
		sessionStorage.BROWSEtitlebox = titlebox;
	} else {
		sessionStorage.BROWSEtitlebox = "";
   }

	window.location = "/browse";

	return false;
}, false);

</script>
